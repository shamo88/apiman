<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>apiman</title>
    <script>
        // 在 React 加载前读取主题，避免闪烁
        (function() {
            var theme = localStorage.getItem('apiman-theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('theme-dark');
                document.body && (document.body.style.backgroundColor = '#242424');
            }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script src="./src/main.tsx" type="module"></script>
</body>

</html>
